steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/minto-api:$COMMIT_SHA
      - -f
      - backend/Dockerfile
      - backend
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/minto-api:$COMMIT_SHA
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - minto-api
      - --image
      - gcr.io/$PROJECT_ID/minto-api:$COMMIT_SHA
      - --region
      - asia-south1
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "8080"

images:
  - gcr.io/$PROJECT_ID/minto-api:$COMMIT_SHA
options:
  logging: CLOUD_LOGGING_ONLY
