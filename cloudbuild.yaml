steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/minto-api'
      - './backend'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/minto-api'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'minto-api'
      - '--image=asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/minto-api'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - >-
        SUPABASE_URL=https://yxnuoabbcxbkgjmluyez.supabase.co,
        SUPABASE_ANON_KEY=REDACTED_SUPABASE_ANON_KEY,
        SUPABASE_JWKS_URL=https://yxnuoabbcxbkgjmluyez.supabase.co/auth/v1/keys,
        SUPABASE_JWT_SECRET=REDACTED_SUPABASE_JWT_SECRET,
        GEMINI_API_KEY=REDACTED_GEMINI_API_KEY,
        MEM0_PROJECT_KEY=REDACTED_MEM0_PROJECT_KEY,
        MEM0_API_KEY=REDACTED_MEM0_API_KEY,
        YFINANCE_MAX_RESULTS=12,
        YFINANCE_NEWS_COUNT=6,
        KITE_API_KEY=REDACTED_KITE_API_KEY,
        KITE_API_SECRET=REDACTED_KITE_API_SECRET,
        KITE_REDIRECT_URL=minto://zerodha-callback

images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/minto-api'
