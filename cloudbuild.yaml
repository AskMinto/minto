steps:
  # ── Backend ───────────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-api
    waitFor: ["-"]   # start immediately, in parallel with build-web
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/minto-api:$COMMIT_SHA
      - -f
      - backend/Dockerfile
      - backend

  - name: gcr.io/cloud-builders/docker
    id: push-api
    waitFor: [build-api]
    args:
      - push
      - gcr.io/$PROJECT_ID/minto-api:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-api
    waitFor: [push-api]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - minto-api
      - --image
      - gcr.io/$PROJECT_ID/minto-api:$COMMIT_SHA
      - --region
      - asia-south1
      - '--set-env-vars'
      - >-
        SUPABASE_URL=https://yxnuoabbcxbkgjmluyez.supabase.co,
        SUPABASE_JWKS_URL=https://yxnuoabbcxbkgjmluyez.supabase.co/auth/v1/keys,
        YFINANCE_MAX_RESULTS=12,
        YFINANCE_NEWS_COUNT=6,
        KITE_REDIRECT_URL=minto://zerodha-callback,
        TWILIO_WHATSAPP_FROM=whatsapp:+14155238886,
        GCS_BUCKET_NAME=minto-wa-uploads
      - '--set-secrets'
      - >-
        SUPABASE_ANON_KEY=projects/557303266732/secrets/SUPABASE_ANON_KEY:latest,
        SUPABASE_JWT_SECRET=projects/557303266732/secrets/SUPABASE_JWT_SECRET:latest,
        GEMINI_API_KEY=projects/557303266732/secrets/GEMINI_API_KEY:latest,
        MEM0_PROJECT_KEY=projects/557303266732/secrets/MEM0_PROJECT_KEY:latest,
        MEM0_API_KEY=projects/557303266732/secrets/MEM0_API_KEY:latest,
        KITE_API_KEY=projects/557303266732/secrets/KITE_API_KEY:latest,
        KITE_API_SECRET=projects/557303266732/secrets/KITE_API_SECRET:latest,
        OPENAI_API_KEY=projects/557303266732/secrets/OPENAI_API_KEY:latest,
        SUPABASE_SERVICE_ROLE_KEY=projects/557303266732/secrets/SUPABASE_SERVICE_ROLE_KEY:latest,
        TWILIO_ACCOUNT_SID=projects/557303266732/secrets/TWILIO_ACCOUNT_SID:latest,
        TWILIO_AUTH_TOKEN=projects/557303266732/secrets/TWILIO_AUTH_TOKEN:latest
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "8080"

  # ── Frontend ──────────────────────────────────────────────────────────────
  # NEXT_PUBLIC_* vars are baked into the JS bundle at build time via ARGs.
  # NEXT_PUBLIC_SUPABASE_ANON_KEY is pulled from Secret Manager via secretEnv.
  - name: gcr.io/cloud-builders/docker
    id: build-web
    waitFor: ["-"]   # start immediately, in parallel with build-api
    secretEnv: ["NEXT_PUBLIC_SUPABASE_ANON_KEY"]
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/minto-web:$COMMIT_SHA
      - -f
      - web-app/Dockerfile
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_URL=https://yxnuoabbcxbkgjmluyez.supabase.co
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=$$NEXT_PUBLIC_SUPABASE_ANON_KEY
      - --build-arg
      - NEXT_PUBLIC_API_BASE_URL=https://minto-api-557303266732.asia-south1.run.app
      - web-app

  - name: gcr.io/cloud-builders/docker
    id: push-web
    waitFor: [build-web]
    args:
      - push
      - gcr.io/$PROJECT_ID/minto-web:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-web
    waitFor: [push-web]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - minto-web
      - --image
      - gcr.io/$PROJECT_ID/minto-web:$COMMIT_SHA
      - --region
      - asia-south1
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "3000"

images:
  - gcr.io/$PROJECT_ID/minto-api:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/minto-web:$COMMIT_SHA
options:
  logging: CLOUD_LOGGING_ONLY
availableSecrets:
  secretManager:
    - versionName: projects/557303266732/secrets/NEXT_PUBLIC_SUPABASE_ANON_KEY/versions/latest
      env: NEXT_PUBLIC_SUPABASE_ANON_KEY
