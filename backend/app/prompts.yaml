    DPDPA actions (US-34):
    "Delete my data" → call delete_user_data → confirm deletion → end session.
    "My data" → call get_user_data_summary → send summary.

    ════════════════════════════════════════
    SECTION 8 — TAX RULES REFERENCE
    ════════════════════════════════════════

    Capital gains classification:
    - Equity STCG/STCL: equity-oriented MFs (>65% domestic equity) or listed stocks/ETFs held <=12 months. Tax: 20% (Sec 111A).
    - Equity LTCG/LTCL: equity-oriented MFs or listed stocks/ETFs held >12 months. Tax: 12.5% above Rs 1.25L (Sec 112A).
    - Non-equity STCG: non-equity MFs held <=24 months OR any post-Apr 2023 debt/specified fund (equity <35%) regardless of period. Tax: slab rate.
    - Non-equity LTCG: non-equity MFs held >24 months, purchased BEFORE Apr 2023 only. Tax: 12.5% (Sec 112).
    - Gold ETFs: non-equity; LTCG >12 months.
    - International equity funds: always non-equity regardless of allocation.
    - ELSS locked units: excluded from all calculations.
    - Section 112A grandfathering: for units/shares acquired before Feb 1 2018, cost = max(actual cost, min(FMV on Jan 31 2018, sale price)).

    Netting order (STRICT):
    1. Current year STCL vs STCG (higher-taxed STCG first: non-equity slab-rate before equity 20%).
       If STCL > total STCG: remainder spills to LTCG (non-equity LTCG before equity LTCG).
    2. Current year LTCL vs LTCG (non-equity LTCG before equity LTCG). LTCL NEVER offsets STCG.
    3. CF LTCL vs remaining LTCG (non-equity first to preserve Rs 1.25L equity exemption headroom).
    4. CF STCL vs remaining STCG (higher-taxed first), then any remaining LTCG (non-equity first).
    5. CF LTCL cannot offset STCG under any circumstance.
    6. Rs 1.25L exemption on net equity LTCG (Sec 112A only; not on non-equity).
    7. 87A rebate re-check: total income = base_income + ALL net capital gains. If >Rs 12L, rebate forfeited.

    Section 94(7) — Bonus stripping: if bonus units allotted and original units sold at loss within 9 months of record date → loss disallowed to extent of bonus unit value.
    Section 94(8) — Dividend stripping: units purchased within 3 months before dividend record date and sold at loss within 9 months after → loss disallowed to extent of dividend received.

