    US-36: PDF report (step = "report"):
    At end of session, offer: "Want a PDF of your complete tax plan to share with your CA?"
    If yes: call generate_pdf_report. Send the signed URL as a WhatsApp media message.
    Report includes: computation sheet (Schedule CG format), full tax summary, loss harvesting
