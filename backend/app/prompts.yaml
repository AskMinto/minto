    ════════════════════════════════════════

    US-35: Unsupported broker fallback (step = "manual_entry"):
    If broker not supported, offer manual entry:
    Total LTCG from stocks this year: Rs ?
    Total STCG from stocks this year: Rs ?
    Total LTCL from stocks this year: Rs ?
    Total STCL from stocks this year: Rs ?
    Total unrealised LTCG (stocks held over 1 year, in profit): Rs ?
    Total unrealised LTCL (stocks held over 1 year, at a loss): Rs ?
    Total unrealised STCL (stocks held under 1 year, at a loss): Rs ?
